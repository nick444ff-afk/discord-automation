<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SystemX - Final</title>
<style>
* {
    box-sizing: border-box;
}
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, #050c1f, #0b1f47);
    color: #e5e7eb;
    min-height: 100vh;
}
.container {
    max-width: 500px;
    margin: auto;
    padding: 15px;
}
.card {
    background: linear-gradient(145deg, #0b1f47, #08142e);
    border-radius: 22px;
    padding: 20px;
    margin-bottom: 20px;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow:
        0 10px 40px rgba(0,0,0,0.6),
        inset 0 0 40px rgba(0,0,0,0.5);
    transition: border-color 0.4s ease, box-shadow 0.4s ease;
}
.card.bot-ligado {
    border-color: rgba(239, 68, 68, 0.45);
    box-shadow:
        0 10px 40px rgba(239,68,68,0.25),
        inset 0 0 40px rgba(0,0,0,0.5);
}
.header {
    text-align: center;
}
.logo {
    width: 80px;
    height: 80px;
    margin: 0 auto 20px;
    border-radius: 22px;
    background: linear-gradient(145deg, #1e3a8a, #1d4ed8);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    box-shadow: 0 0 25px rgba(59,130,246,0.4);
}
.logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.title {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 4px;
}
.subtitle {
    opacity: 0.6;
    font-size: 13px;
    margin-top: 5px;
}
.status {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 15px;
}
.badge {
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.3s ease;
}
.badge-green {
    background: rgba(16,185,129,0.15);
    color: #34d399;
    border: 1px solid rgba(16,185,129,0.3);
}
.badge-red {
    background: rgba(239,68,68,0.15);
    color: #f87171;
    border: 1px solid rgba(239,68,68,0.3);
}
.badge-yellow {
    background: rgba(250,204,21,0.15);
    color: #facc15;
    border: 1px solid rgba(250,204,21,0.3);
}
.bot-tabs {
    display: flex;
    background: #091a36;
    border-radius: 30px;
    padding: 6px;
    margin-top: 15px;
}
.bot-tabs div {
    flex: 1;
    text-align: center;
    padding: 10px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: 600;
    user-select: none;
}
.bot-tabs div:hover:not(.active) {
    background: rgba(255,255,255,0.07);
}
.bot-tabs .active {
    background: #e5e7eb;
    color: #000;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}

.play-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 30px 0 10px;
}
.play {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.35s ease;
    position: relative;
    background: rgba(255,255,255,0.03);
    user-select: none;
}
.play:hover {
    transform: scale(1.06);
    box-shadow: 0 0 30px rgba(255,255,255,0.2);
}
.play:active {
    transform: scale(0.97);
}

.play .icon-play {
    width: 0;
    height: 0;
    border-left: 32px solid #fff;
    border-top: 20px solid transparent;
    border-bottom: 20px solid transparent;
    margin-left: 8px;
    transition: opacity 0.2s;
}

.play .icon-stop {
    width: 26px;
    height: 26px;
    background: #ef4444;
    border-radius: 4px;
    display: none;
    animation: blink 1.2s infinite;
}

.play.ligado {
    border-color: #ef4444;
    box-shadow: 0 0 35px rgba(239,68,68,0.5), 0 0 60px rgba(239,68,68,0.2);
    background: rgba(239,68,68,0.08);
}
.play.ligado:hover {
    box-shadow: 0 0 45px rgba(239,68,68,0.65), 0 0 70px rgba(239,68,68,0.25);
}
.play.ligado .icon-play {
    display: none;
}
.play.ligado .icon-stop {
    display: block;
}
@keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.35; }
}
.play-label {
    margin-top: 14px;
    font-size: 13px;
    opacity: 0.65;
    text-align: center;
    transition: color 0.3s;
    letter-spacing: 0.5px;
}
.play-label.ligado {
    color: #f87171;
    opacity: 1;
    font-weight: 600;
}

.card.stat {
    padding: 18px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.stat-title {
    font-size: 14px;
    opacity: 0.65;
    font-weight: 500;
}
.stat-value {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
}
.green-text  { color: #22c55e; }
.purple-text { color: #a855f7; }
.cyan-text   { color: #06b6d4; }
.yellow-text { color: #facc15; }

.reset-container {
    margin: 0 0 20px;
    padding: 0;
}
.reset-btn {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: 1px solid rgba(255, 80, 80, 0.4);
    background: rgba(255, 80, 80, 0.08);
    color: #ff5a5a;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    backdrop-filter: blur(6px);
    letter-spacing: 0.5px;
}
.reset-btn:hover {
    background: rgba(255, 80, 80, 0.18);
    border-color: rgba(255, 80, 80, 0.7);
    box-shadow: 0 0 15px rgba(255,80,80,0.2);
}
.reset-btn:active {
    transform: scale(0.97);
}

label {
    margin-top: 15px;
    display: block;
    font-size: 14px;
    font-weight: 500;
    opacity: 0.85;
}
input, textarea, select {
    width: 100%;
    padding: 14px;
    margin-top: 6px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.07);
    background: #020617;
    color: #fff;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
}
input:focus, textarea:focus, select:focus {
    border-color: rgba(34,211,238,0.4);
}
select option {
    background: #0b1f47;
}
.orgs-box {
    background: #020617;
    border-radius: 14px;
    padding: 10px 15px;
    max-height: 180px;
    overflow-y: auto;
    margin-top: 8px;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
}
.org-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 9px 5px;
    cursor: pointer;
    font-size: 15px;
    border-radius: 8px;
    transition: background 0.2s;
}
.org-item:hover {
    background: rgba(255,255,255,0.04);
}
.org-item input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: #22d3ee;
    cursor: pointer;
    margin: 0;
    padding: 0;
    border: none;
    background: none;
}
.org-item input:checked + span {
    color: #22d3ee;
}
.save-btn {
    width: 100%;
    padding: 15px;
    margin-top: 20px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #1d4ed8, #2563eb);
    color: #fff;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.25s ease;
    box-shadow: 0 4px 15px rgba(29,78,216,0.35);
}
.save-btn:hover {
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    box-shadow: 0 6px 20px rgba(29,78,216,0.5);
    transform: translateY(-1px);
}
.save-btn:active {
    transform: scale(0.98) translateY(0);
}
.save-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
}

.logs {
    background: #000;
    padding: 15px;
    border-radius: 12px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    height: 200px;
    overflow-y: auto;
    line-height: 1.6;
    border: 1px solid rgba(255,255,255,0.05);
}
.logs::-webkit-scrollbar { width: 5px; }
.logs::-webkit-scrollbar-track { background: #000; }
.logs::-webkit-scrollbar-thumb { background: #1d4ed8; border-radius: 3px; }
.log-entry { margin: 2px 0; }
.log-time { color: #4b5563; margin-right: 6px; }
.log-info { color: #22d3ee; }
.log-success { color: #22c55e; }
.log-warn { color: #facc15; }
.log-error { color: #f87171; }
.clear-logs-btn {
    margin-top: 12px;
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid rgba(255,90,90,0.35);
    background: rgba(255,90,90,0.1);
    color: #ff5a5a;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.25s ease;
    letter-spacing: 0.5px;
}
.clear-logs-btn:hover {
    background: rgba(255,90,90,0.2);
    border-color: rgba(255,90,90,0.6);
    box-shadow: 0 0 12px rgba(255,90,90,0.2);
}
.clear-logs-btn:active {
    transform: scale(0.97);
}

.instancia-text {
    opacity: 0.6;
    margin-top: 10px;
    font-size: 13px;
    letter-spacing: 0.5px;
    transition: color 0.3s;
}

.controle-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0;
}
.controle-header h3 {
    margin: 0;
}
.bot-indicator {
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    background: rgba(34,211,238,0.12);
    color: #22d3ee;
    font-weight: 600;
    border: 1px solid rgba(34,211,238,0.25);
    transition: all 0.3s;
}
.org-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 10px;
}
.org-action-btn {
    padding: 8px 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #1d4ed8;
    color: #fff;
    font-weight: 600;
}

.org-form {
    display: none;
    margin-top: 12px;
    padding: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
}

.remove-form {
    display: none;
    margin-top: 12px;
    padding: 15px;
    border: 1px solid rgba(239,68,68,0.4);
    border-radius: 10px;
    background: rgba(239,68,68,0.08);
}

.remove-form h4 {
    margin: 0 0 12px 0;
    color: #f87171;
    font-size: 14px;
}

.remove-form .orgs-box {
    background: rgba(20,10,10,0.5);
    border-color: rgba(239,68,68,0.3);
    margin-bottom: 12px;
}

.remove-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
}

.remove-btn {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
}

.remove-btn.cancel {
    background: rgba(100,116,139,0.2);
    color: #94a3b8;
}

.remove-btn.delete {
    background: #ef4444;
    color: #fff;
}
</style>
</head>
<body>
<div class="container">

    <div class="card header">
        <div class="logo">
            <img src="https://i.imgur.com/llnJtbZ.png" alt="Logo">
        </div>
        <h1 class="title">SystemX</h1>
        <p class="subtitle">PAINEL DE CONTROLE</p>

        <div class="status">
            <div class="badge badge-red" id="badgeConexao">Desconectado</div>
            <div class="badge badge-red" id="badgeStatus">Parado</div>
        </div>

        <div class="bot-tabs" id="botTabs">
            <div class="active" data-bot="BOT1" onclick="mudarBot(this)">BOT1</div>
            <div data-bot="BOT2" onclick="mudarBot(this)">BOT2</div>
        </div>

        <p class="instancia-text" id="instancia">INSTÂNCIA ATIVA: BOT 1</p>
    </div>

    <div class="card" id="cardControle">
        <div class="controle-header">
            <h3 id="controleTitle">Controle - Bot 1</h3>
            <span class="bot-indicator" id="botIndicator">BOT1</span>
        </div>

        <div class="play-wrapper">
            <div class="play" id="playButton" onclick="toggleBot()">
                <div class="icon-play"></div>
                <div class="icon-stop"></div>
            </div>
            <p class="play-label" id="playLabel">Clique para iniciar o bot</p>
        </div>
    </div>

    <div class="card stat">
        <div class="stat-title">Entradas</div>
        <div class="stat-value" id="entradas">0</div>
    </div>

    <div class="card stat">
        <div class="stat-title">Na Fila</div>
        <div class="stat-value green-text" id="naFila">0</div>
    </div>

    <div class="card stat">
        <div class="stat-title">Partidas</div>
        <div class="stat-value purple-text" id="partidas">0</div>
    </div>

    <div class="card stat">
        <div class="stat-title">DMs</div>
        <div class="stat-value cyan-text" id="dms">0</div>
    </div>

    <div class="card stat">
        <div class="stat-title">Uptime</div>
        <div class="stat-value yellow-text" id="uptime">00:00:00</div>
    </div>

    <div class="reset-container">
        <button class="reset-btn" onclick="resetStats()">RESETAR STATS</button>
    </div>

    <div class="card">
        <h3>Configuração</h3>

        <label>Tokens</label>
        <textarea id="tokens" rows="3" placeholder="Cole seus tokens aqui (um por linha)"></textarea>
        <div id="tokenError" class="error-message" style="display: none;"></div>

        <label>Rotação</label>
        <input type="number" id="rotation" value="90" min="1">

        <label>Categoria</label>
        <select id="category">
            <option>Mobile</option>
            <option>Emulador</option>
            <option>Misto</option>
            <option>Tático</option>
        </select>

        <label>Selecionar Orgs</label>
        <div class="orgs-box" id="orgsBox"></div>
        <div class="org-actions">
            <button type="button" class="org-action-btn" onclick="abrirAdicionar()">Adicionar</button>
            <button type="button" class="org-action-btn" id="btnRemoverOrg" onclick="abrirRemover()">Remover</button>
        </div>

        <div class="org-form" id="orgForm">
            <label>Nome da Org</label><input id="novaOrgNome">
            <label>ID da Org</label><input id="novaOrgId">
            <label>ID da Categoria</label><input id="novaCategoriaId">
            <button type="button" class="org-action-btn" onclick="adicionarOrg()">Adicionar</button>
        </div>

        <div class="remove-form" id="removeForm">
            <h4>Selecione as Orgs para Remover</h4>
            <div class="orgs-box" id="removeOrgsBox"></div>
            <div class="remove-actions">
                <button type="button" class="remove-btn cancel" onclick="cancelarRemover()">Cancelar</button>
                <button type="button" class="remove-btn delete" id="btnConfirmarRemover" onclick="confirmarRemover()" disabled>Remover</button>
            </div>
        </div>

        <label>Modos</label>
        <div class="orgs-box">
            <label class="org-item">
                <input type="checkbox" id="modo1x1">
                <span>1x1</span>
            </label>
            <label class="org-item">
                <input type="checkbox" id="modo2x2" checked>
                <span>2x2</span>
            </label>
            <label class="org-item">
                <input type="checkbox" id="modo3x3">
                <span>3x3</span>
            </label>
            <label class="org-item">
                <input type="checkbox" id="modo4x4" checked>
                <span>4x4</span>
            </label>
        </div>

        <label>Delay</label>
        <input type="number" id="delay" value="12" min="1">

        <label>Mensagem</label>
        <input type="text" id="mensagem" placeholder="Digite a mensagem">

        <label>Mensagem Secundária</label>
        <input type="text" id="mensagemSecundaria" placeholder="Digite a mensagem secundária">

        <button class="save-btn" id="saveBtnConfig" onclick="salvarConfiguracao()">SALVAR CONFIGURAÇÃO</button>
        <div id="configMessage" class="success-message" style="display: none;"></div>
    </div>

    <div class="card">
        <h3>Logs</h3>
        <div class="logs" id="logs"></div>
        <button class="clear-logs-btn" onclick="limparLogs()">Limpar Logs</button>
    </div>

</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = '/api/bot';

let botAtivo = 'BOT1';
let botLigado = false;
let uptimeInterval = null;
let uptimeSeconds = 0;
let isSaving = false;
let orgs = [];
let orgsRemocaoSelecionadas = [];

document.addEventListener('DOMContentLoaded', function () {
    addLog('Sistema inicializado.', 'info');
    verificarConexao();
    setInterval(verificarConexao, 5000);
    setInterval(atualizarStatusBot, 3000);
    setInterval(fetchLogs, 1000);
    carregarOrgs();
});

function carregarOrgs() {
    const savedOrgs = localStorage.getItem('orgs');
    if (savedOrgs) {
        orgs = JSON.parse(savedOrgs);
        renderizarOrgs();
    }
}

function renderizarOrgs() {
    const orgsBox = document.getElementById('orgsBox');
    orgsBox.innerHTML = '';
    orgs.forEach((org, index) => {
        const item = document.createElement('label');
        item.className = 'org-item';
        item.innerHTML = `<input type="checkbox" data-index="${index}"><span>${org.nome}</span>`;
        orgsBox.appendChild(item);
    });
}

function abrirAdicionar() {
    const form = document.getElementById('orgForm');
    form.style.display = form.style.display === 'block' ? 'none' : 'block';
    document.getElementById('removeForm').style.display = 'none';
}

function adicionarOrg() {
    const nome = document.getElementById('novaOrgNome').value;
    const id = document.getElementById('novaOrgId').value;
    const catId = document.getElementById('novaCategoriaId').value;
    if (nome && id && catId) {
        orgs.push({ nome, id, catId });
        localStorage.setItem('orgs', JSON.stringify(orgs));
        renderizarOrgs();
        document.getElementById('orgForm').style.display = 'none';
        document.getElementById('novaOrgNome').value = '';
        document.getElementById('novaOrgId').value = '';
        document.getElementById('novaCategoriaId').value = '';
        addLog(`Org ${nome} adicionada.`, 'success');
    }
}

function abrirRemover() {
    const removeForm = document.getElementById('removeForm');
    removeForm.style.display = removeForm.style.display === 'block' ? 'none' : 'block';
    document.getElementById('orgForm').style.display = 'none';
    if (removeForm.style.display === 'block') {
        renderizarOrgsRemocao();
    }
}

function renderizarOrgsRemocao() {
    const box = document.getElementById('removeOrgsBox');
    box.innerHTML = '';
    orgsRemocaoSelecionadas = [];
    atualizarBotaoRemover();
    orgs.forEach((org, index) => {
        const item = document.createElement('label');
        item.className = 'org-item';
        item.innerHTML = `<input type="checkbox" onchange="toggleSelecaoRemover(${index}, this)"><span>${org.nome}</span>`;
        box.appendChild(item);
    });
}

function toggleSelecaoRemover(index, checkbox) {
    if (checkbox.checked) {
        orgsRemocaoSelecionadas.push(index);
    } else {
        orgsRemocaoSelecionadas = orgsRemocaoSelecionadas.filter(i => i !== index);
    }
    atualizarBotaoRemover();
}

function atualizarBotaoRemover() {
    const btn = document.getElementById('btnConfirmarRemover');
    if (orgsRemocaoSelecionadas.length > 0) {
        btn.textContent = 'Remover';
        btn.disabled = false;
    } else {
        btn.textContent = 'Cancelar';
        btn.disabled = false;
    }
}

function cancelarRemover() {
    document.getElementById('removeForm').style.display = 'none';
}

function confirmarRemover() {
    if (orgsRemocaoSelecionadas.length === 0) {
        cancelarRemover();
        return;
    }
    orgs = orgs.filter((_, i) => !orgsRemocaoSelecionadas.includes(i));
    localStorage.setItem('orgs', JSON.stringify(orgs));
    renderizarOrgs();
    cancelarRemover();
    addLog('Organizações removidas.', 'warn');
}

function addLog(msg, level = 'info') {
    const logs = document.getElementById('logs');
    const entry = document.createElement('div');
    entry.className = `log-entry log-${level}`;
    entry.innerHTML = `<span class="log-time">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
    logs.prepend(entry);
}

async function verificarConexao() {
    try {
        const r = await fetch('/api/bot/status/BOT1');
        if (r.ok) {
            document.getElementById('badgeConexao').textContent = 'Conectado';
            document.getElementById('badgeConexao').className = 'badge badge-green';
        }
    } catch (e) {
        document.getElementById('badgeConexao').textContent = 'Desconectado';
        document.getElementById('badgeConexao').className = 'badge badge-red';
    }
}

async function atualizarStatusBot() {
    try {
        const r = await fetch(`${API_URL}/status/${botAtivo}`);
        const d = await r.json();
        botLigado = d.isRunning;
        
        const badge = document.getElementById('badgeStatus');
        badge.textContent = botLigado ? 'Rodando' : 'Parado';
        badge.className = `badge ${botLigado ? 'badge-green' : 'badge-red'}`;
        
        document.getElementById('playButton').className = `play ${botLigado ? 'ligado' : ''}`;
        document.getElementById('cardControle').className = `card ${botLigado ? 'bot-ligado' : ''}`;
        document.getElementById('playLabel').textContent = botLigado ? 'Bot em execução' : 'Clique para iniciar o bot';
        document.getElementById('playLabel').className = `play-label ${botLigado ? 'ligado' : ''}`;

        if (d.stats) {
            document.getElementById('entradas').textContent = d.stats.entries || 0;
            document.getElementById('naFila').textContent = d.stats.queues || 0;
            document.getElementById('partidas').textContent = d.stats.matches || 0;
            document.getElementById('dms').textContent = d.stats.dms || 0;
            document.getElementById('uptime').textContent = d.stats.uptime || '00:00:00';
        }
    } catch (e) {}
}

async function fetchLogs() {
    try {
        const r = await fetch(`${API_URL}/logs/${botAtivo}`);
        const d = await r.json();
        const logs = document.getElementById('logs');
        logs.innerHTML = '';
        d.forEach(log => {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${log.level.toLowerCase()}`;
            entry.innerHTML = `<span class="log-time">[${new Date(log.createdAt).toLocaleTimeString()}]</span> ${log.message}`;
            logs.appendChild(entry);
        });
    } catch (e) {}
}

function mudarBot(el) {
    if (el.getAttribute('data-bot') === botAtivo) return;
    document.querySelectorAll('.bot-tabs div').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    botAtivo = el.getAttribute('data-bot');
    document.getElementById('instancia').textContent = `INSTÂNCIA ATIVA: ${botAtivo === 'BOT1' ? 'BOT 1' : 'BOT 2'}`;
    document.getElementById('controleTitle').textContent = `Controle - ${botAtivo === 'BOT1' ? 'Bot 1' : 'Bot 2'}`;
    document.getElementById('botIndicator').textContent = botAtivo;
    carregarConfiguracao();
}

async function carregarConfiguracao() {
    try {
        const r = await fetch(`${API_URL}/config/${botAtivo}`);
        if (r.ok) {
            const d = await r.json();
            document.getElementById('tokens').value = d.tokens || '';
            document.getElementById('rotation').value = d.rotation || 90;
            document.getElementById('category').value = d.category || 'Mobile';
            document.getElementById('mensagem').value = d.mensagem || '';
        }
    } catch (e) {}
}

async function salvarConfiguracao() {
    const data = {
        tokens: document.getElementById('tokens').value,
        rotation: document.getElementById('rotation').value,
        category: document.getElementById('category').value,
        mensagem: document.getElementById('mensagem').value
    };
    try {
        const r = await fetch(`${API_URL}/config/${botAtivo}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        if (r.ok) {
            showToast('Configuração salva!', 'success');
        }
    } catch (e) { showToast('Erro ao salvar!', 'error'); }
}

async function toggleBot() {
    const action = botLigado ? 'stop' : 'start';
    try {
        const r = await fetch(`${API_URL}/${action}/${botAtivo}`, { method: 'POST' });
        const d = await r.json();
        if (d.success) {
            showToast(botLigado ? 'Bot Parado!' : 'Bot Iniciado!', 'success');
            atualizarStatusBot();
        }
    } catch (e) {}
}

async function resetStats() {
    try {
        await fetch(`${API_URL}/reset/${botAtivo}`, { method: 'POST' });
        showToast('Estatísticas resetadas!');
    } catch (e) {}
}

async function limparLogs() {
    try {
        await fetch(`${API_URL}/logs/${botAtivo}`, { method: 'DELETE' });
        document.getElementById('logs').innerHTML = '';
        showToast('Logs limpos!');
    } catch (e) {}
}

function showToast(msg, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = `toast show ${type}`;
    setTimeout(() => toast.classList.remove('show'), 3000);
}
</script>
</body>
</html>
